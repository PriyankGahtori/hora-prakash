<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#312e81"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>

  <!-- Outer ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#6366f1" stroke-width="2" opacity="0.5"/>
  <circle cx="256" cy="256" r="200" fill="none" stroke="#818cf8" stroke-width="1" opacity="0.3"/>

  <!-- North Indian chart diamond (rotated square) — the core motif -->
  <!-- Outer diamond -->
  <polygon points="256,72 440,256 256,440 72,256"
           fill="none" stroke="url(#gold)" stroke-width="3" opacity="0.9"/>

  <!-- Inner diamond -->
  <polygon points="256,152 360,256 256,360 152,256"
           fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.7"/>

  <!-- Cross lines connecting outer to inner diamond corners -->
  <line x1="256" y1="72"  x2="256" y2="152" stroke="#fde68a" stroke-width="2" opacity="0.5"/>
  <line x1="440" y1="256" x2="360" y2="256" stroke="#fde68a" stroke-width="2" opacity="0.5"/>
  <line x1="256" y1="440" x2="256" y2="360" stroke="#fde68a" stroke-width="2" opacity="0.5"/>
  <line x1="72"  y1="256" x2="152" y2="256" stroke="#fde68a" stroke-width="2" opacity="0.5"/>

  <!-- Diagonal connecting lines (corner triangles) -->
  <line x1="256" y1="72"  x2="440" y2="256" stroke="#a5b4fc" stroke-width="1" opacity="0.25"/>
  <line x1="440" y1="256" x2="256" y2="440" stroke="#a5b4fc" stroke-width="1" opacity="0.25"/>
  <line x1="256" y1="440" x2="72"  y2="256" stroke="#a5b4fc" stroke-width="1" opacity="0.25"/>
  <line x1="72"  y1="256" x2="256" y2="72"  stroke="#a5b4fc" stroke-width="1" opacity="0.25"/>

  <!-- Central sun / lagna point -->
  <circle cx="256" cy="256" r="28" fill="url(#gold)" filter="url(#glow)" opacity="0.95"/>
  <circle cx="256" cy="256" r="18" fill="#312e81"/>
  <circle cx="256" cy="256" r="8"  fill="url(#gold)"/>

  <!-- 4 small accent dots at inner diamond corners -->
  <circle cx="256" cy="152" r="5" fill="#fde68a" opacity="0.8"/>
  <circle cx="360" cy="256" r="5" fill="#fde68a" opacity="0.8"/>
  <circle cx="256" cy="360" r="5" fill="#fde68a" opacity="0.8"/>
  <circle cx="152" cy="256" r="5" fill="#fde68a" opacity="0.8"/>
</svg>
